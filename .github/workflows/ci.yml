name: ci

on:
  push:
    branches: ["main"]
  pull_request:

# Default minimal; jobs can override if needed.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: |
          python -m ruff check .

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      # Fail-closed coverage threshold to match Makefile COV_FAIL_UNDER=85.
      - name: Tests + coverage (V1, fail-under=85)
        run: |
          python -m pytest -q \
            --cov=kprovengine \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-fail-under=85

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/**

  build_governance:
    name: build + governance (identity/artifacts/pre-commit)
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: DCO check
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BASE_SHA: ${{ github.event.before }}
          PUSH_HEAD_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            BASE_SHA="$PR_BASE_SHA"
            HEAD_SHA="$PR_HEAD_SHA"
          else
            BASE_SHA="$PUSH_BASE_SHA"
            HEAD_SHA="$PUSH_HEAD_SHA"
          fi
          python scripts/check_dco.py --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Install (dev)
        run: |
          python -m pip install -U pip
          python -m pip install -e ".[dev]"

      # Mirror local venv-policy gate: supported is >=3.11 and <3.13.
      - name: Python version policy (>=3.11,<3.13)
        run: |
          python scripts/check_venv_python.py --min 3.11 --max-excl 3.13

      - name: Build dist
        run: |
          rm -rf dist
          python -m build -q

      - name: Upload dist artifacts (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: dist-ci
          path: |
            dist/**

      - name: Identity guard
        run: |
          python scripts/check_project_identity.py

      - name: Artifact guard (tracked)
        run: |
          bash scripts/check_tracked_artifacts.sh

      - name: Verify changeset manifest (if present)
        run: |
          if [ -f changeset-manifest.json ]; then
            python scripts/verify_changeset_manifest.py --manifest changeset-manifest.json
          else
            echo "No changeset-manifest.json present; skipping verification."
          fi

      - name: Pre-commit
        run: |
          python -m pre_commit run --all-files
